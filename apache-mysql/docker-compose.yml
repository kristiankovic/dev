services:
    app:
        build: .
        container_name: estacion_meteorologica
        environment:
            - TZ=America/El_Salvador
        ports:
            - "8080:80"
        depends_on:
            - db
        volumes:
            - ./proyectos:/var/www/html
        networks:
            - estacion_net
    
    db:
        image: mysql:8.0
        container_name: mysql
        environment:
            - MYSQL_ROOT_PASSWORD=rootpass
            - MYSQL_DATABASE=db_temperatura
            - MYSQL_USER=appuser
            - MYSQL_PASSWORD=pass
            - TZ=America/El_Salvador
        command: --default-time-zone='-06:00'
        ports:
            - "3307:3306"
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - estacion_net
        
    phpmyadmin:
        image: phpmyadmin:latest
        container_name: phpmyadmin
        depends_on:
            - db
        environment:
            - PMA_HOST=db
            - PMA_USER=root
            - PMA_PASSWORD=rootpass #Si se usa - se debe usar Key=Value, sino Key: Value
        ports:
            - "8082:80"
        networks:
            - estacion_net

volumes:
    db_data:

networks:
    estacion_net: