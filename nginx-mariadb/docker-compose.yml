services:
  web:
    image: nginx:alpine
    container_name: server
    ports:
      - "8080:80"
    volumes:
      - ./html:/usr/share/nginx/html
    networks:
      - net-project

  db:
    image: mariadb:latest
    container_name: database
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mi_base_datos
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - net-project

volumes:
  db_data:

networks:
  net-project: